# Gradle
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=true

# Mod metadata (shared across all version nodes)
mod.id=blackboard
mod.name=Blackboard
mod.version=0.1.3
mod.group=com.tonywww.blackboard

# CurseForge publishing (me.modmuss50.mod-publish-plugin) — `./gradlew publishAllVersions`.
# projectId is the numeric id on the CurseForge project page ("About Project"); it is NOT secret.
curseforge.projectId=1594689
# The API token IS secret — do NOT put it here. It lives in your USER-level
# ~/.gradle/gradle.properties (curseforge.token=...), or set the CURSEFORGE_TOKEN env var.
